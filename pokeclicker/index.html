<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PokéClick</title>
  <!-- css l8r-->
  <!-- <link rel="stylesheet" href="style.css" /> -->
</head>
<body>
  <header>
    <h1>PokéClick</h1>
    <p>Click Me</p>
  </header>

  <!-- button + counter-->
  <main>
    <button id="clickBtn">Click Me!</button>
    <p>Points: <span id="counter">0</span></p>

    <!-- Cards will be added here from api l8r -->
    <section id="cards"></section>

    <!--second button to unlock the box -->
    <button id="catchBtn">Catch Pokemon! (10 Points)</button>
  </main>


  <script>
    //adds to the pointer (counter)
    let count = 0;
    const counter = document.getElementById("counter");
    document.getElementById("clickBtn").addEventListener("click", () => {
      count++;
      counter.textContent = count;
  });
    document.getElementById("catchBtn").addEventListener("click", async () => {
      if (count >= 10) {
        count -= 10;
        counter.textContent = count;

        const id = Math.floor(Math.random() * 151) + 1;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();

        const card = document.createElement("div");
        card.innerHTML = `
          <img src="${data.sprites.front_default}" alt="${data.name}" />
          <p>${data.name}</p>
        `;
        document.getElementById("cards").appendChild(card);

      } else {
        alert("Not enough points!");
      }
    });
  </script>

</body>
</html>
